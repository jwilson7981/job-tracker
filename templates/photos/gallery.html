{% extends "base.html" %}
{% block title %}Project Photos - Construction Management{% endblock %}
{% block content %}
<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
    <h1>Project Photos</h1>
    <div style="display:flex;gap:8px;">
        <button id="btnNewAlbum" class="btn btn-secondary" onclick="showNewAlbumModal()" style="display:none;"><i class="fas fa-folder-plus"></i> New Album</button>
        <button class="btn btn-primary" onclick="showCameraModal()"><i class="fas fa-camera"></i> Take Photo</button>
        <button class="btn btn-primary" onclick="showUploadModal()"><i class="fas fa-upload"></i> Upload Photos</button>
    </div>
</div>

<!-- Filters -->
<div class="filter-bar" style="display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap;">
    <select id="photoJobFilter" class="form-select" onchange="onJobFilterChange()" style="max-width:250px;">
        <option value="">All Projects</option>
    </select>
    <select id="photoCategoryFilter" class="form-select" onchange="loadPhotos()" style="max-width:200px;">
        <option value="">All Categories</option>
        <option value="General">General</option>
        <option value="Rough-In">Rough-In</option>
        <option value="Trim Out">Trim Out</option>
        <option value="Startup">Startup</option>
        <option value="Closeout">Closeout</option>
        <option value="Issue">Issue</option>
        <option value="Progress">Progress</option>
        <option value="Before">Before</option>
        <option value="After">After</option>
    </select>
</div>

<!-- Album Breadcrumb -->
<div id="albumBreadcrumb" style="display:none;margin-bottom:16px;">
    <a href="#" onclick="closeAlbum();return false;" style="color:var(--primary);text-decoration:none;font-size:14px;">
        <i class="fas fa-arrow-left"></i> Back to Albums
    </a>
    <span id="albumBreadcrumbName" style="margin-left:8px;font-weight:600;font-size:14px;"></span>
</div>

<!-- Album Cards -->
<div id="albumCards" style="display:none;margin-bottom:24px;">
    <h3 style="margin:0 0 12px 0;font-size:16px;color:#374151;">Albums</h3>
    <div id="albumGrid" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:12px;"></div>
</div>

<!-- Un-albumed Photos Label -->
<div id="unAlbumedLabel" style="display:none;margin-bottom:12px;">
    <h3 style="margin:0;font-size:16px;color:#374151;">Other Photos</h3>
</div>

<!-- Gallery Grid -->
<div id="photoGallery" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));gap:12px;"></div>

<!-- Upload Modal -->
<div id="uploadModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:500px;">
        <div class="modal-header">
            <h2>Upload Photos</h2>
            <button class="modal-close" onclick="document.getElementById('uploadModal').style.display='none'">&times;</button>
        </div>
        <form onsubmit="uploadPhotos(event)" style="padding:16px;">
            <div class="form-group">
                <label class="form-label">Project</label>
                <select id="uploadJob" class="form-select" required onchange="loadAlbumDropdown('uploadAlbum', this.value)">
                    <option value="">Select Project...</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Album <span style="color:#9CA3AF;font-weight:normal;">(optional)</span></label>
                <select id="uploadAlbum" class="form-select">
                    <option value="">No Album</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select id="uploadCategory" class="form-select">
                    <option value="General">General</option>
                    <option value="Rough-In">Rough-In</option>
                    <option value="Trim Out">Trim Out</option>
                    <option value="Startup">Startup</option>
                    <option value="Closeout">Closeout</option>
                    <option value="Issue">Issue</option>
                    <option value="Progress">Progress</option>
                    <option value="Before">Before</option>
                    <option value="After">After</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Caption</label>
                <input type="text" id="uploadCaption" class="form-input" placeholder="Optional caption">
            </div>
            <div class="form-group">
                <label class="form-label">Photos</label>
                <input type="file" id="uploadFiles" accept="image/*" multiple required style="padding:8px;">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('uploadModal').style.display='none'">Cancel</button>
                <button type="submit" class="btn btn-primary">Upload</button>
            </div>
        </form>
    </div>
</div>

<!-- Camera Modal -->
<div id="cameraModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:500px;">
        <div class="modal-header">
            <h2>Take Photo</h2>
            <button class="modal-close" onclick="document.getElementById('cameraModal').style.display='none'">&times;</button>
        </div>
        <form onsubmit="takePhoto(event)" style="padding:16px;">
            <div class="form-group">
                <label class="form-label">Project</label>
                <select id="cameraJob" class="form-select" required onchange="loadAlbumDropdown('cameraAlbum', this.value)">
                    <option value="">Select Project...</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Album <span style="color:#9CA3AF;font-weight:normal;">(optional)</span></label>
                <select id="cameraAlbum" class="form-select">
                    <option value="">No Album</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select id="cameraCategory" class="form-select">
                    <option value="General">General</option>
                    <option value="Rough-In">Rough-In</option>
                    <option value="Trim Out">Trim Out</option>
                    <option value="Startup">Startup</option>
                    <option value="Closeout">Closeout</option>
                    <option value="Issue">Issue</option>
                    <option value="Progress">Progress</option>
                    <option value="Before">Before</option>
                    <option value="After">After</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Caption</label>
                <input type="text" id="cameraCaption" class="form-input" placeholder="Optional caption">
            </div>
            <div class="form-group">
                <label class="form-label">Photo</label>
                <input type="file" id="cameraFile" accept="image/*" capture="environment" required style="padding:8px;">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('cameraModal').style.display='none'">Cancel</button>
                <button type="submit" class="btn btn-primary">Upload</button>
            </div>
        </form>
    </div>
</div>

<!-- New Album Modal -->
<div id="newAlbumModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:400px;">
        <div class="modal-header">
            <h2>New Album</h2>
            <button class="modal-close" onclick="document.getElementById('newAlbumModal').style.display='none'">&times;</button>
        </div>
        <form onsubmit="saveAlbum(event)" style="padding:16px;">
            <div class="form-group">
                <label class="form-label">Album Name</label>
                <input type="text" id="newAlbumName" class="form-input" placeholder="e.g. Building A" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('newAlbumModal').style.display='none'">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Album</button>
            </div>
        </form>
    </div>
</div>

<!-- Move Photo Modal -->
<div id="movePhotoModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:400px;">
        <div class="modal-header">
            <h2>Move to Album</h2>
            <button class="modal-close" onclick="document.getElementById('movePhotoModal').style.display='none'">&times;</button>
        </div>
        <div style="padding:16px;">
            <div class="form-group">
                <label class="form-label">Select Album</label>
                <select id="movePhotoAlbum" class="form-select">
                    <option value="">No Album (remove from album)</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('movePhotoModal').style.display='none'">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="confirmMovePhoto()">Move</button>
            </div>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div id="lightbox" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:10000;align-items:center;justify-content:center;flex-direction:column;">
    <button onclick="closeLightbox()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:white;font-size:32px;cursor:pointer;">&times;</button>
    <button id="lbPrev" onclick="navLightbox(-1)" style="position:absolute;left:16px;top:50%;background:none;border:none;color:white;font-size:40px;cursor:pointer;">&#8249;</button>
    <button id="lbNext" onclick="navLightbox(1)" style="position:absolute;right:16px;top:50%;background:none;border:none;color:white;font-size:40px;cursor:pointer;">&#8250;</button>
    <img id="lbImage" style="max-width:90%;max-height:80vh;object-fit:contain;">
    <div id="lbCaption" style="color:white;text-align:center;padding:12px;font-size:14px;"></div>
</div>

<script src="/static/photos.js"></script>
{% endblock %}
