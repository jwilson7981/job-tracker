{% extends "base.html" %}
{% block title %}Order Detail{% endblock %}
{% block content %}
<div class="page-header">
    <h1 id="pageTitle">Order</h1>
    <div style="display:flex;gap:8px;align-items:center;">
        <span id="statusBadge" class="status-badge"></span>
        <button class="btn btn-primary" id="btnSave" onclick="saveOrder()">Save</button>
        <button class="btn btn-secondary" id="btnSubmit" style="display:none;" onclick="submitOrder()">Submit Order</button>
        <button class="btn btn-secondary" id="btnConfirm" style="display:none;" onclick="confirmOrder()">Confirm</button>
        <button class="btn btn-secondary" id="btnReceive" style="display:none;" onclick="openReceiveModal()">Receive Items</button>
        <button class="btn btn-danger" id="btnDelete" style="display:none;" onclick="deleteOrder()">Delete</button>
        <a href="/orders" class="btn btn-secondary">Back</a>
    </div>
</div>

<!-- Order Info -->
<div class="card" style="padding:20px;margin-bottom:16px;">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
        <div>
            <label class="form-label">Job</label>
            <input type="text" id="fldJob" class="form-input" readonly>
        </div>
        <div>
            <label class="form-label">Supplier</label>
            <input type="text" id="fldSupplier" class="form-input" readonly>
        </div>
        <div>
            <label class="form-label">Order Number</label>
            <input type="text" id="fldOrderNumber" class="form-input">
        </div>
        <div>
            <label class="form-label">Takeoff Type</label>
            <input type="text" id="fldTakeoffType" class="form-input" readonly>
        </div>
        <div>
            <label class="form-label">Expected Delivery</label>
            <input type="date" id="fldDelivery" class="form-input">
        </div>
        <div>
            <label class="form-label">Status</label>
            <input type="text" id="fldStatus" class="form-input" readonly>
        </div>
    </div>
    <div style="margin-top:12px;">
        <label class="form-label">Notes</label>
        <textarea id="fldNotes" class="form-textarea" rows="2"></textarea>
    </div>
</div>

<!-- Totals -->
<div class="card" style="padding:20px;margin-bottom:16px;">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">
        <div>
            <label class="form-label">Subtotal</label>
            <input type="number" id="fldSubtotal" class="form-input" step="0.01" readonly>
        </div>
        <div>
            <label class="form-label">Tax</label>
            <input type="number" id="fldTax" class="form-input" step="0.01" oninput="calcTotal()">
        </div>
        <div>
            <label class="form-label">Freight</label>
            <input type="number" id="fldFreight" class="form-input" step="0.01" oninput="calcTotal()">
        </div>
        <div>
            <label class="form-label" style="font-weight:700;">Total</label>
            <input type="text" id="fldTotal" class="form-input" style="font-weight:700;font-size:16px;" readonly>
        </div>
    </div>
</div>

<!-- Items Table -->
<div class="card" style="padding:20px;">
    <h3 style="margin-bottom:12px;">Line Items</h3>
    <div class="module-table-wrapper">
        <table class="data-table" style="font-size:13px;">
            <thead><tr>
                <th>#</th>
                <th>SKU</th>
                <th>Description</th>
                <th style="text-align:right;">Quote Qty</th>
                <th style="text-align:right;">Takeoff Qty</th>
                <th style="text-align:right;">Order Qty</th>
                <th style="text-align:right;">Received</th>
                <th style="text-align:right;">Unit Price</th>
                <th style="text-align:right;">Extended</th>
                <th>Source</th>
                <th id="colActions">Actions</th>
            </tr></thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </div>
    <div id="addItemRow" style="margin-top:12px;display:flex;gap:8px;align-items:center;">
        <input type="text" id="addSku" class="form-input" placeholder="SKU" style="width:100px;">
        <input type="text" id="addDesc" class="form-input" placeholder="Description" style="flex:1;">
        <input type="number" id="addQty" class="form-input" placeholder="Qty" style="width:80px;" min="0">
        <input type="number" id="addPrice" class="form-input" placeholder="Unit Price" style="width:100px;" step="0.01" min="0">
        <button class="btn btn-secondary btn-small" onclick="addItem()">+ Add</button>
    </div>
</div>

<!-- Receive Modal -->
<div id="receiveModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeReceiveModal()">
    <div class="modal-box" style="max-width:800px;">
        <div class="modal-header">
            <h3>Receive Items</h3>
            <button onclick="closeReceiveModal()" class="modal-close">&times;</button>
        </div>
        <div class="modal-body" style="max-height:60vh;overflow-y:auto;">
            <table class="data-table" style="font-size:13px;">
                <thead><tr>
                    <th>SKU</th>
                    <th>Description</th>
                    <th style="text-align:right;">Ordered</th>
                    <th style="text-align:right;">Previously Received</th>
                    <th style="text-align:right;width:100px;">Receiving Now</th>
                </tr></thead>
                <tbody id="receiveBody"></tbody>
            </table>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeReceiveModal()">Cancel</button>
            <button class="btn btn-primary" onclick="submitReceive()">Record Receipt</button>
        </div>
    </div>
</div>

<style>
.disc-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.disc-matched { background: #dcfce7; color: #15803d; }
.disc-mismatch { background: #FEF3C7; color: #92400e; }
.disc-quote-only { background: #FEF2F2; color: #991b1b; }
.disc-takeoff-only { background: #FFF7ED; color: #9a3412; }
.disc-manual { background: #f0f0f0; color: #555; }
.row-mismatch { background: #FEF3C7 !important; }
.row-quote-only { background: #FEF2F2 !important; }
.row-takeoff-only { background: #FFF7ED !important; }
</style>
<script src="/static/orders.js?v=20260306"></script>
{% endblock %}
