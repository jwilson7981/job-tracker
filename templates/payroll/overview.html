{% extends "base.html" %}
{% block title %}Payroll - Construction Management{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Payroll & Labor</h1>
    <div style="display:inline-flex;gap:6px;">
        <button class="btn btn-secondary btn-small" onclick="exportToExcel('Payroll','payrollBody','Payroll')">Excel</button>
        <button class="btn btn-secondary btn-small" onclick="exportToPDF('Payroll','payrollBody','Payroll')">PDF</button>
        <button class="btn btn-primary" onclick="showAddEmployee()">+ Add Employee</button>
    </div>
</div>
<div class="module-table-wrapper">
    <table class="data-table">
        <thead><tr>
            <th>Employee</th><th>Role</th><th>Hourly Rate</th><th>Total Hours</th><th>Pending Hours</th><th>Total Pay</th><th></th>
        </tr></thead>
        <tbody id="payrollBody"><tr><td colspan="7" class="loading">Loading...</td></tr></tbody>
    </table>
</div>

<!-- Add Employee Modal -->
<div id="addEmployeeModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeAddEmployee()">
    <div class="modal-box" style="max-width:500px;">
        <div class="modal-header">
            <h3 id="empModalTitle">Add Employee</h3>
            <button onclick="closeAddEmployee()" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editEmpId">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="bid-field"><label class="form-label">Display Name *</label>
                    <input type="text" id="empName" class="form-input" placeholder="e.g. John Smith"></div>
                <div class="bid-field"><label class="form-label">Username *</label>
                    <input type="text" id="empUsername" class="form-input" placeholder="e.g. jsmith"></div>
                <div class="bid-field" id="empPasswordGroup"><label class="form-label">Password *</label>
                    <input type="password" id="empPassword" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Role</label>
                    <select id="empRole" class="form-select">
                        <option value="employee">Employee</option>
                        <option value="warehouse">Warehouse</option>
                        <option value="project_manager">Project Manager</option>
                        <option value="admin">Admin</option>
                    </select></div>
                <div class="bid-field"><label class="form-label">Hourly Rate</label>
                    <input type="number" id="empRate" class="form-input" step="0.01" min="0" value="0"></div>
                <div class="bid-field"><label class="form-label">Email</label>
                    <input type="email" id="empEmail" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Phone</label>
                    <input type="text" id="empPhone" class="form-input"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeAddEmployee()">Cancel</button>
            <button class="btn btn-primary" onclick="saveEmployee()">Save</button>
        </div>
    </div>
</div>

<script src="/static/payroll.js"></script>
{% endblock %}
