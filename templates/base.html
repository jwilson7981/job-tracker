<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Construction Management{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v=20260309f">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LGHVAC CM">
    <meta name="theme-color" content="#3B82F6">
</head>
<body class="{% if current_user %}has-sidebar{% endif %} {% block body_class %}{% endblock %}" {% if current_user %}data-role="{{ current_user.role }}"{% endif %}>
    {% if current_user %}
    {% include 'sidebar.html' %}
    {% endif %}
    <div class="app-main{% if not current_user %} no-sidebar{% endif %}">
        {% block header %}{% endblock %}
        <main class="container">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="/static/app.js?v=20260309d"></script>
    <script src="/static/export_utils.js?v=20260304b"></script>
    {% block scripts %}{% endblock %}
    {% if current_user %}
    <!-- Floating Calculator Widget -->
    <div class="calc-widget" id="calcWidget">
        <div class="calc-widget-header" onclick="toggleCalc()">
            <span>&#128290; Calculator</span>
            <span class="calc-widget-toggle" id="calcToggle">&#9650;</span>
        </div>
        <div class="calc-widget-body" id="calcBody">
            <input type="text" id="calcDisplay" class="calc-display" readonly value="0">
            <div class="calc-buttons">
                <button class="calc-btn calc-fn" onclick="calcClear()">C</button>
                <button class="calc-btn calc-fn" onclick="calcBackspace()">&#9003;</button>
                <button class="calc-btn calc-fn" onclick="calcPercent()">%</button>
                <button class="calc-btn calc-op" onclick="calcOp('/')">&divide;</button>
                <button class="calc-btn" onclick="calcDigit('7')">7</button>
                <button class="calc-btn" onclick="calcDigit('8')">8</button>
                <button class="calc-btn" onclick="calcDigit('9')">9</button>
                <button class="calc-btn calc-op" onclick="calcOp('*')">&times;</button>
                <button class="calc-btn" onclick="calcDigit('4')">4</button>
                <button class="calc-btn" onclick="calcDigit('5')">5</button>
                <button class="calc-btn" onclick="calcDigit('6')">6</button>
                <button class="calc-btn calc-op" onclick="calcOp('-')">&minus;</button>
                <button class="calc-btn" onclick="calcDigit('1')">1</button>
                <button class="calc-btn" onclick="calcDigit('2')">2</button>
                <button class="calc-btn" onclick="calcDigit('3')">3</button>
                <button class="calc-btn calc-op" onclick="calcOp('+')">+</button>
                <button class="calc-btn calc-zero" onclick="calcDigit('0')">0</button>
                <button class="calc-btn" onclick="calcDigit('.')">.</button>
                <button class="calc-btn calc-eq" onclick="calcEquals()">=</button>
            </div>
        </div>
    </div>
    <script>
    let _calcVal='', _calcPrev='', _calcOp='', _calcReset=false;
    function toggleCalc(){
        const b=document.getElementById('calcBody'), t=document.getElementById('calcToggle');
        if(b.style.display==='none'){b.style.display='';t.innerHTML='&#9650;';}
        else{b.style.display='none';t.innerHTML='&#9660;';}
    }
    function calcUpdate(){document.getElementById('calcDisplay').value=_calcVal||'0';}
    function calcDigit(d){
        if(_calcReset){_calcVal='';_calcReset=false;}
        if(d==='.'&&_calcVal.includes('.'))return;
        _calcVal+=d;calcUpdate();
    }
    function calcOp(op){
        if(_calcVal&&_calcPrev&&_calcOp)calcEquals();
        _calcPrev=_calcVal||_calcPrev;_calcOp=op;_calcVal='';
    }
    function calcEquals(){
        if(!_calcPrev||!_calcOp)return;
        const a=parseFloat(_calcPrev),b=parseFloat(_calcVal||'0');
        let r=0;
        if(_calcOp==='+')r=a+b;else if(_calcOp==='-')r=a-b;
        else if(_calcOp==='*')r=a*b;else if(_calcOp==='/')r=b!==0?a/b:0;
        _calcVal=parseFloat(r.toFixed(10)).toString();_calcPrev='';_calcOp='';_calcReset=true;calcUpdate();
    }
    function calcClear(){_calcVal='';_calcPrev='';_calcOp='';_calcReset=false;calcUpdate();}
    function calcBackspace(){_calcVal=_calcVal.slice(0,-1);calcUpdate();}
    function calcPercent(){if(_calcVal)_calcVal=(parseFloat(_calcVal)/100).toString();calcUpdate();}
    document.getElementById('calcBody').style.display='none';
    document.getElementById('calcToggle').innerHTML='&#9660;';
    </script>

    <!-- Floating Chat Widget -->
    <div class="chat-widget" id="chatWidget">
        <div class="chat-widget-header" id="chatWidgetHeader">
            <span class="chat-widget-title">Chat Assistant</span>
            <span class="chat-widget-toggle" id="chatWidgetToggle">&#9650;</span>
        </div>
        <div class="chat-widget-body" id="chatWidgetBody">
            <div class="chat-widget-messages" id="widgetMessages">
                <div class="chat-widget-welcome">Ask me about bids, jobs, hours, codes, and more.</div>
            </div>
            <div class="chat-widget-input-bar">
                <input type="text" id="widgetInput" class="form-input" placeholder="Type or tap mic..." autocomplete="off">
                <button class="btn btn-small chat-mic-btn" id="widgetMicBtn" title="Voice input">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
                <button class="btn btn-primary btn-small" id="widgetSendBtn">Send</button>
            </div>
        </div>
    </div>
    <script>
    fetch('/api/heartbeat',{method:'POST'});setInterval(()=>fetch('/api/heartbeat',{method:'POST'}),60000);
    // Global toast — prominent top-center with icon and animation
    window.showToast = function(msg, color) {
            var prev = document.getElementById('global-toast');
            if (prev) prev.remove();
            var isError = (color && color !== '#059669');
            var icon = isError ? '\u2716' : '\u2714';
            var bg = color || '#059669';
            var t = document.createElement('div');
            t.id = 'global-toast';
            t.style.cssText = 'position:fixed;top:24px;left:50%;transform:translateX(-50%);background:' + bg + ';color:#fff;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:600;z-index:99999;box-shadow:0 8px 32px rgba(0,0,0,0.25);display:flex;align-items:center;gap:10px;animation:toast-in 0.3s ease;white-space:nowrap;';
            var ic = document.createElement('span');
            ic.textContent = icon;
            ic.style.cssText = 'font-size:20px;line-height:1;';
            t.appendChild(ic);
            t.appendChild(document.createTextNode(msg));
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.animation = 'toast-out 0.3s ease forwards';
                setTimeout(function() { t.remove(); }, 300);
            }, 3000);
    };
    // Auto-toast: intercept fetch to show toast on successful save/generate/delete + errors
    (function() {
        var origFetch = window.fetch;
        window.fetch = function(url, opts) {
            var method = (opts && opts.method || 'GET').toUpperCase();
            if (method === 'GET' || method === 'HEAD') return origFetch.apply(this, arguments);
            var urlStr = typeof url === 'string' ? url : (url && url.url) || '';
            if (urlStr.indexOf('/heartbeat') !== -1 || urlStr.indexOf('/check-duplicate') !== -1 || urlStr.indexOf('/detect-pdf') !== -1 || urlStr.indexOf('/reorder') !== -1) {
                return origFetch.apply(this, arguments);
            }
            return origFetch.apply(this, arguments).then(function(response) {
                var clone = response.clone();
                clone.json().then(function(data) {
                    if (data && data.ok === true && !data._noToast) {
                        if (!window._toastShown) {
                            var isUpload = opts && opts.body instanceof FormData;
                            var action = method === 'DELETE' ? 'Deleted' : (urlStr.indexOf('generate') !== -1 || urlStr.indexOf('pdf') !== -1) ? 'Generated' : isUpload ? 'Uploaded' : 'Saved';
                            window.showToast(action + ' successfully');
                        }
                        window._toastShown = false;
                    } else if (data && (data.ok === false || data.error) && !data._noToast) {
                        window.showToast(data.error || 'Operation failed', '#DC2626');
                        window._toastShown = false;
                    }
                }).catch(function() {
                    if (!response.ok) {
                        window.showToast('Something went wrong — please try again', '#DC2626');
                    }
                });
                return response;
            }).catch(function(err) {
                window.showToast('Connection error — please try again', '#DC2626');
                throw err;
            });
        };
    })();
    </script>
    <script src="/static/chat_widget.js?v=20260304b"></script>
    <script src="/static/duplicate_check.js?v=20260304b"></script>
    <script src="/static/drag_drop.js?v=20260304c"></script>
    <script src="/static/email_autocomplete.js?v=20260309"></script>
    {% endif %}
</body>
</html>
