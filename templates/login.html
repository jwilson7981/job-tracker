<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LGHVAC Management</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
</head>
<body class="login-body">
    <div class="login-card">
        <img src="/static/icons/icon-192.png" alt="LGHVAC" style="width:80px;height:80px;border-radius:14px;margin-bottom:16px;">
        <h1 class="login-title">LGHVAC Management</h1>
        <p class="login-subtitle">Sign in to continue</p>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="login-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="login-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary login-btn">Sign In</button>
        </form>
        <div style="text-align:center;margin-top:16px;">
            <a href="#" onclick="document.getElementById('forgotMsg').style.display='block';this.style.display='none';return false;"
               style="color:var(--primary,#2563EB);font-size:13px;text-decoration:none;">Forgot Password?</a>
            <div id="forgotMsg" style="display:none;margin-top:12px;background:#FEF3C7;border:1px solid #FCD34D;border-radius:10px;padding:14px 16px;font-size:13px;color:#92400E;line-height:1.5;text-align:left;">
                <strong>Contact an admin to reset your password:</strong><br>
                James: (text or call)<br>
                Dan: (text or call)<br><br>
                They can reset your password from inside the app.
            </div>
        </div>
    </div>
</body>
</html>
