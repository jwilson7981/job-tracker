{% extends "base.html" %}
{% block title %}Employees - Construction Management{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Employees</h1>
    <div style="display:inline-flex;gap:6px;">
        <button class="btn btn-primary" onclick="showAddEmployee()">+ Add Employee</button>
    </div>
</div>

<div style="display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap;">
    <input type="text" id="empSearch" class="form-input" placeholder="Search employees..." style="max-width:280px;" oninput="filterEmployees()">
    <select id="empStatusFilter" class="form-select" style="max-width:180px;" onchange="loadEmployees()">
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
        <option value="Terminated">Terminated</option>
        <option value="all">All</option>
    </select>
    <span id="empCount" style="font-size:13px;color:var(--gray-500);"></span>
</div>

<div class="module-table-wrapper">
    <table class="data-table">
        <thead><tr>
            <th>Emp #</th><th>Name</th><th>Role</th><th>Phone</th><th>Pay Rate</th><th>Status</th><th></th>
        </tr></thead>
        <tbody id="empBody"><tr><td colspan="7" class="loading">Loading...</td></tr></tbody>
    </table>
</div>

<!-- Add/Edit Employee Modal -->
<div id="empModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeEmpModal()">
    <div class="modal-box" style="max-width:700px;max-height:90vh;overflow-y:auto;">
        <div class="modal-header">
            <h3 id="empModalTitle">Add Employee</h3>
            <button onclick="closeEmpModal()" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="empEditId">

            <h4 style="margin:0 0 10px;font-size:14px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;">Basic Info</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
                <div class="bid-field"><label class="form-label">First Name</label>
                    <input type="text" id="empFirstName" class="form-input" placeholder="e.g. John"></div>
                <div class="bid-field"><label class="form-label">Last Name</label>
                    <input type="text" id="empLastName" class="form-input" placeholder="e.g. Smith"></div>
                <div class="bid-field"><label class="form-label">Username <span style="font-weight:normal;color:var(--gray-400);">(optional — for app login)</span></label>
                    <input type="text" id="empUsername" class="form-input" placeholder="e.g. jsmith"></div>
                <div class="bid-field" id="empPasswordGroup"><label class="form-label">Password <span style="font-weight:normal;color:var(--gray-400);">(optional)</span></label>
                    <input type="password" id="empPassword" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Role</label>
                    <select id="empRole" class="form-select">
                        <option value="employee">Employee</option>
                        <option value="warehouse">Warehouse</option>
                        <option value="project_manager">Project Manager</option>
                        <option value="admin">Admin</option>
                    </select></div>
                <div class="bid-field"><label class="form-label">Home Base City</label>
                    <input type="text" id="empHomeCity" class="form-input" placeholder="e.g. Edmond"></div>
                <div class="bid-field"><label class="form-label">Employee #</label>
                    <input type="text" id="empNumber" class="form-input" placeholder="e.g. EMP-001"></div>
                <div class="bid-field"><label class="form-label">Email</label>
                    <input type="email" id="empEmail" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Phone</label>
                    <input type="text" id="empPhone" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Hire Date</label>
                    <input type="date" id="empHireDate" class="form-input"></div>
            </div>

            <h4 style="margin:0 0 10px;font-size:14px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;">Personal</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;">
                <div class="bid-field"><label class="form-label">Date of Birth</label>
                    <input type="date" id="empDOB" class="form-input"></div>
                <div class="bid-field"><label class="form-label">SSN</label>
                    <input type="password" id="empSSN" class="form-input" placeholder="###-##-####" autocomplete="off"></div>
                <div class="bid-field"><label class="form-label">Shirt Size</label>
                    <select id="empShirtSize" class="form-select">
                        <option value="">--</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="2XL">2XL</option>
                        <option value="3XL">3XL</option>
                    </select></div>
            </div>

            <h4 style="margin:0 0 10px;font-size:14px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;">Address</h4>
            <div style="display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:4px;">
                <div class="bid-field"><label class="form-label">Street</label>
                    <input type="text" id="empStreet" class="form-input"></div>
            </div>
            <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:20px;">
                <div class="bid-field"><label class="form-label">City</label>
                    <input type="text" id="empCity" class="form-input"></div>
                <div class="bid-field"><label class="form-label">State</label>
                    <input type="text" id="empState" class="form-input" maxlength="2" placeholder="OK"></div>
                <div class="bid-field"><label class="form-label">ZIP</label>
                    <input type="text" id="empZip" class="form-input" maxlength="10"></div>
            </div>

            <h4 style="margin:0 0 10px;font-size:14px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;">Pay</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
                <div class="bid-field"><label class="form-label">Hourly Rate ($)</label>
                    <input type="number" id="empRate" class="form-input" step="0.01" min="0" value="0"></div>
            </div>

            <h4 style="margin:0 0 10px;font-size:14px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;">Emergency Contact</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;">
                <div class="bid-field"><label class="form-label">Name</label>
                    <input type="text" id="empECName" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Phone</label>
                    <input type="text" id="empECPhone" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Relationship</label>
                    <input type="text" id="empECRelation" class="form-input" placeholder="e.g. Spouse"></div>
            </div>

            <div class="bid-field"><label class="form-label">Notes</label>
                <textarea id="empNotes" class="form-input" rows="2"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeEmpModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveEmployee()">Save</button>
        </div>
    </div>
</div>

<script src="/static/employees.js?v={{ sv }}"></script>
{% endblock %}
