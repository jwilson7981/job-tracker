<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password - LGHVAC</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .cp-card {
            max-width: 420px;
            margin: 60px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            overflow: hidden;
        }
        .cp-banner {
            background: linear-gradient(135deg, #059669 0%, #10B981 100%);
            padding: 32px 24px 24px;
            text-align: center;
            color: #fff;
        }
        .cp-banner h1 {
            margin: 0 0 6px;
            font-size: 22px;
            font-weight: 700;
        }
        .cp-banner p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .cp-banner .cp-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }
        .cp-body {
            padding: 28px 24px 24px;
        }
        .cp-notice {
            background: #ECFDF5;
            border: 1px solid #A7F3D0;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #065F46;
            line-height: 1.5;
        }
        .cp-field {
            margin-bottom: 16px;
        }
        .cp-field label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            color: #374151;
        }
        .cp-field input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #D1D5DB;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .cp-field input:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5,150,105,0.15);
        }
        .cp-submit {
            width: 100%;
            padding: 14px;
            background: #059669;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s;
        }
        .cp-submit:hover { background: #047857; }
        .cp-error {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #991B1B;
        }
    </style>
</head>
<body style="background:#F3F4F6;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <div class="cp-card">
        <div class="cp-banner">
            <span class="cp-icon">&#128274;</span>
            <h1>Create Your New Password</h1>
            <p>This is NOT the login screen &mdash; you're already logged in!</p>
        </div>
        <div class="cp-body">
            <div class="cp-notice">
                You've signed in successfully. Now <strong>create a new password</strong> that you'll use from now on. Your temporary password will stop working after this.
            </div>
            {% if error %}
            <div class="cp-error">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/change-password">
                <div class="cp-field">
                    <label for="new_password">New Password (6+ characters)</label>
                    <input type="password" id="new_password" name="new_password" required autofocus minlength="6" placeholder="Enter your new password">
                </div>
                <div class="cp-field">
                    <label for="confirm_password">Type It Again to Confirm</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Re-enter your new password">
                </div>
                <button type="submit" class="cp-submit">Save My New Password</button>
            </form>
        </div>
    </div>
</body>
</html>
