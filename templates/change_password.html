<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Construction Management</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo"><img src="/static/icons/icon-192.png" alt="LGHVAC" style="width:100%;height:100%;object-fit:contain;border-radius:12px;"></div>
        <h1 class="login-title">Set Your Password</h1>
        <p class="login-subtitle">Please choose a new password to continue</p>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/change-password">
            <div class="login-field">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required autofocus minlength="6">
            </div>
            <div class="login-field">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary login-btn">Set Password</button>
        </form>
    </div>
</body>
</html>
