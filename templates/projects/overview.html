{% extends "base.html" %}
{% block title %}Projects - Construction Management{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Project Manager</h1>
    <button class="btn btn-primary" onclick="showNewJobModal()">+ New Job</button>
</div>
<div class="module-table-wrapper">
    <table class="data-table">
        <thead><tr>
            <th>Project</th><th>Status</th><th>Location</th><th>Material Cost</th><th>Expenses</th><th>Service Calls</th><th>Warranties</th><th>Updated</th><th></th>
        </tr></thead>
        <tbody id="projectsBody"><tr><td colspan="9" class="loading">Loading...</td></tr></tbody>
    </table>
</div>

<!-- New Job Modal -->
<div id="newJobModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)hideNewJobModal()">
    <div class="modal">
        <div class="modal-header">
            <h2>Create New Job</h2>
            <button class="modal-close" onclick="hideNewJobModal()">&times;</button>
        </div>
        <form onsubmit="createJob(event)">
            <div class="form-group">
                <label class="form-label">Job Name</label>
                <input type="text" id="jobName" class="form-input" placeholder="e.g. Building A — Phase 2" autofocus required>
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <input type="text" id="jobAddress" class="form-input" placeholder="123 Main St">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">City</label>
                    <input type="text" id="jobCity" class="form-input" placeholder="City">
                </div>
                <div class="form-group" style="flex:0 0 80px;">
                    <label class="form-label">State</label>
                    <input type="text" id="jobState" class="form-input" placeholder="OK" maxlength="2">
                </div>
                <div class="form-group" style="flex:0 0 100px;">
                    <label class="form-label">Zip Code</label>
                    <input type="text" id="jobZip" class="form-input" placeholder="73034" maxlength="5">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Tax Rate %</label>
                    <input type="number" id="jobTaxRate" class="form-input" placeholder="8.625" step="0.001" min="0">
                </div>
                <div class="form-group">
                    <span id="taxLookupInfo" style="font-size:12px;color:var(--gray-500);"></span>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="hideNewJobModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Job</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Job Modal -->
<div id="editJobModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)hideEditJobModal()">
    <div class="modal">
        <div class="modal-header">
            <h2>Edit Job</h2>
            <button class="modal-close" onclick="hideEditJobModal()">&times;</button>
        </div>
        <form onsubmit="updateProject(event)">
            <input type="hidden" id="editJobId">
            <div class="form-group">
                <label class="form-label">Job Name</label>
                <input type="text" id="editJobName" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select id="editJobStatus" class="form-select">
                    <option value="Needs Bid">Needs Bid</option>
                    <option value="Bid Complete">Bid Complete</option>
                    <option value="Awarded">Awarded</option>
                    <option value="Pre-Construction">Pre-Construction</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Complete">Complete</option>
                    <option value="Closed">Closed</option>
                    <option value="Lost">Lost</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <input type="text" id="editJobAddress" class="form-input">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">City</label>
                    <input type="text" id="editJobCity" class="form-input">
                </div>
                <div class="form-group" style="flex:0 0 80px;">
                    <label class="form-label">State</label>
                    <input type="text" id="editJobState" class="form-input" maxlength="2">
                </div>
                <div class="form-group" style="flex:0 0 100px;">
                    <label class="form-label">Zip Code</label>
                    <input type="text" id="editJobZip" class="form-input" maxlength="5">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Tax Rate %</label>
                <input type="number" id="editJobTaxRate" class="form-input" step="0.001" min="0">
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="hideEditJobModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
var USER_ROLE = '{{ current_user.role }}';
function showNewJobModal() {
    document.getElementById('newJobModal').style.display = 'flex';
    document.getElementById('jobName').focus();
}
function hideNewJobModal() {
    document.getElementById('newJobModal').style.display = 'none';
    document.getElementById('jobName').value = '';
    document.getElementById('jobAddress').value = '';
    document.getElementById('jobCity').value = '';
    document.getElementById('jobState').value = '';
    document.getElementById('jobZip').value = '';
    document.getElementById('jobTaxRate').value = '';
    document.getElementById('taxLookupInfo').textContent = '';
}
async function createJob(e) {
    e.preventDefault();
    const name = document.getElementById('jobName').value.trim();
    if (!name) return;
    const payload = {
        name,
        address: document.getElementById('jobAddress').value.trim(),
        city: document.getElementById('jobCity').value.trim(),
        state: document.getElementById('jobState').value.trim(),
        zip_code: document.getElementById('jobZip').value.trim(),
    };
    const taxVal = document.getElementById('jobTaxRate').value;
    if (taxVal !== '') payload.tax_rate = parseFloat(taxVal) || 0;
    const res = await fetch('/api/jobs', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    if (res.ok) {
        const data = await res.json();
        window.location.href = '/projects/' + data.id;
    } else {
        alert('Failed to create job.');
    }
}
</script>
<script src="/static/projects.js"></script>
{% endblock %}
