{% extends "base.html" %}
{% block title %}Projects - Construction Management{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Project Manager</h1>
    <button class="btn btn-primary" onclick="showNewJobModal()">+ New Project</button>
</div>
<div style="margin-bottom:12px;">
    <label class="form-label" style="display:inline;margin-right:8px;">Filter by Status:</label>
    <select id="projectStatusFilter" class="form-select" style="display:inline-block;width:auto;" onchange="filterProjects()">
        <option value="">All</option>
        <option value="Needs Bid">Needs Bid</option>
        <option value="Bid Complete">Bid Complete</option>
        <option value="Awarded">Awarded</option>
        <option value="Pre-Construction">Pre-Construction</option>
        <option value="In Progress">In Progress</option>
        <option value="Complete">Complete</option>
        <option value="Closed">Closed</option>
        <option value="Lost">Lost</option>
    </select>
</div>
<style>
.pj-qlink {
    display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:13px;
    color:var(--gray-700,#374151);text-decoration:none;border-radius:6px;
    border:1px solid var(--gray-200,#e2e8f0);background:#fff;transition:all .12s;
}
.pj-qlink:hover { background:var(--primary,#2563EB);color:#fff;border-color:var(--primary,#2563EB); }
.pj-qlink:hover .pj-count { background:#fff; color:var(--primary,#2563EB); }
.pj-count {
    margin-left:auto;font-size:11px;font-weight:700;min-width:20px;text-align:center;
    padding:1px 6px;border-radius:9999px;background:var(--primary,#2563EB);color:#fff;line-height:1.4;
}
.pj-count-warn { background:#D97706; }
.pj-qlink:hover .pj-count-warn { color:#D97706; }
.cust-search-wrap { position:relative; }
.cust-search-results {
    position:absolute;left:0;right:0;top:100%;z-index:100;background:#fff;
    border:1px solid var(--gray-200,#e2e8f0);border-radius:6px;max-height:200px;overflow-y:auto;
    box-shadow:0 4px 12px rgba(0,0,0,.12);display:none;
}
.cust-search-results .cust-item {
    padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--gray-100,#f1f5f9);
}
.cust-search-results .cust-item:hover { background:var(--blue-50,#eff6ff); }
.cust-search-results .cust-item:last-child { border-bottom:none; }
.cust-search-results .cust-item small { color:var(--gray-400,#9CA3AF); }
</style>
<div class="module-table-wrapper">
    <table class="data-table">
        <thead><tr>
            <th>Project</th><th>Customer</th><th>Status</th><th>Location</th><th>Tax Rate</th><th>Material Cost</th><th>Expenses</th><th>Service Calls</th><th>Warranties</th><th>Updated</th><th></th>
        </tr></thead>
        <tbody id="projectsBody"><tr><td colspan="11" class="loading">Loading...</td></tr></tbody>
    </table>
</div>

<!-- New Job Modal -->
<div id="newJobModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)hideNewJobModal()">
    <div class="modal">
        <div class="modal-header">
            <h2>Create New Project</h2>
            <button class="modal-close" onclick="hideNewJobModal()">&times;</button>
        </div>
        <form onsubmit="createJob(event)">
            <div class="form-group">
                <label class="form-label">Project Name</label>
                <input type="text" id="jobName" class="form-input" placeholder="e.g. Building A — Phase 2" autofocus required>
            </div>
            <div class="form-group">
                <label class="form-label">Customer</label>
                <div class="cust-search-wrap">
                    <input type="hidden" id="jobCustomerId">
                    <input type="text" id="jobCustomerSearch" class="form-input" placeholder="Search customers..." autocomplete="off">
                    <div class="cust-search-results" id="jobCustomerResults"></div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <input type="text" id="jobAddress" class="form-input" placeholder="123 Main St">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">City</label>
                    <input type="text" id="jobCity" class="form-input" placeholder="City">
                </div>
                <div class="form-group" style="flex:0 0 80px;">
                    <label class="form-label">State</label>
                    <input type="text" id="jobState" class="form-input" placeholder="OK" maxlength="2">
                </div>
                <div class="form-group" style="flex:0 0 100px;">
                    <label class="form-label">Zip Code</label>
                    <input type="text" id="jobZip" class="form-input" placeholder="73034" maxlength="5">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Tax Rate %</label>
                    <input type="number" id="jobTaxRate" class="form-input" placeholder="8.625" step="0.001" min="0">
                </div>
                <div class="form-group">
                    <span id="taxLookupInfo" style="font-size:12px;color:var(--gray-500);"></span>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="hideNewJobModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Project</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Job Modal -->
<div id="editJobModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)hideEditJobModal()">
    <div class="modal">
        <div class="modal-header">
            <h2>Edit Project</h2>
            <button class="modal-close" onclick="hideEditJobModal()">&times;</button>
        </div>
        <form onsubmit="updateProject(event)">
            <input type="hidden" id="editJobId">
            <div class="form-group">
                <label class="form-label">Project Name</label>
                <input type="text" id="editJobName" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select id="editJobStatus" class="form-select">
                    <option value="Needs Bid">Needs Bid</option>
                    <option value="Bid Complete">Bid Complete</option>
                    <option value="Awarded">Awarded</option>
                    <option value="Pre-Construction">Pre-Construction</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Complete">Complete</option>
                    <option value="Closed">Closed</option>
                    <option value="Lost">Lost</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Customer</label>
                <div class="cust-search-wrap">
                    <input type="hidden" id="editJobCustomerId">
                    <input type="text" id="editJobCustomerSearch" class="form-input" placeholder="Search customers..." autocomplete="off">
                    <div class="cust-search-results" id="editJobCustomerResults"></div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <input type="text" id="editJobAddress" class="form-input">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">City</label>
                    <input type="text" id="editJobCity" class="form-input">
                </div>
                <div class="form-group" style="flex:0 0 80px;">
                    <label class="form-label">State</label>
                    <input type="text" id="editJobState" class="form-input" maxlength="2">
                </div>
                <div class="form-group" style="flex:0 0 100px;">
                    <label class="form-label">Zip Code</label>
                    <input type="text" id="editJobZip" class="form-input" maxlength="5">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Tax Rate %</label>
                <input type="number" id="editJobTaxRate" class="form-input" step="0.001" min="0">
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="hideEditJobModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
var USER_ROLE = '{{ current_user.role }}';
function showNewJobModal() {
    document.getElementById('newJobModal').style.display = 'flex';
    document.getElementById('jobName').focus();
}
function hideNewJobModal() {
    document.getElementById('newJobModal').style.display = 'none';
    document.getElementById('jobName').value = '';
    document.getElementById('jobCustomerId').value = '';
    document.getElementById('jobCustomerSearch').value = '';
    document.getElementById('jobCustomerResults').style.display = 'none';
    document.getElementById('jobAddress').value = '';
    document.getElementById('jobCity').value = '';
    document.getElementById('jobState').value = '';
    document.getElementById('jobZip').value = '';
    document.getElementById('jobTaxRate').value = '';
    document.getElementById('taxLookupInfo').textContent = '';
}
// Auto-fill tax rate, city, state from zip code
document.getElementById('jobZip').addEventListener('blur', async function() {
    const zip = this.value.trim();
    if (zip.length !== 5) return;
    try {
        const r = await fetch('/api/tax-lookup/' + zip);
        const d = await r.json();
        if (d.tax_rate) {
            document.getElementById('jobTaxRate').value = d.tax_rate;
            document.getElementById('taxLookupInfo').textContent = 'Tax rate auto-filled from zip code';
        }
        if (d.city && !document.getElementById('jobCity').value.trim())
            document.getElementById('jobCity').value = d.city;
        if (d.state && !document.getElementById('jobState').value.trim())
            document.getElementById('jobState').value = d.state;
    } catch(e) {}
});
// ─── Customer Typeahead ───────────────────────────────────
function initCustomerTypeahead(inputId, hiddenId, resultsId) {
    var input = document.getElementById(inputId);
    var hidden = document.getElementById(hiddenId);
    var dropdown = document.getElementById(resultsId);
    var debounce;
    input.addEventListener('input', function() {
        clearTimeout(debounce);
        var q = input.value.trim();
        if (q.length < 1) { dropdown.style.display = 'none'; hidden.value = ''; return; }
        debounce = setTimeout(function() {
            fetch('/api/customers/search?q=' + encodeURIComponent(q))
                .then(function(r) { return r.json(); })
                .then(function(custs) {
                    if (!custs.length) {
                        dropdown.innerHTML = '<div class="cust-item" style="color:var(--gray-400);">No customers found</div>';
                    } else {
                        dropdown.innerHTML = custs.map(function(c) {
                            return '<div class="cust-item" data-id="' + c.id + '" data-name="' + (c.company_name || '').replace(/"/g, '&quot;') + '">'
                                + (c.company_name || '') + (c.primary_contact ? ' <small>(' + c.primary_contact + ')</small>' : '')
                                + '</div>';
                        }).join('');
                    }
                    dropdown.style.display = 'block';
                });
        }, 200);
    });
    input.addEventListener('focus', function() {
        if (input.value.trim().length >= 1) input.dispatchEvent(new Event('input'));
    });
    dropdown.addEventListener('click', function(e) {
        var item = e.target.closest('.cust-item');
        if (!item || !item.dataset.id) return;
        hidden.value = item.dataset.id;
        input.value = item.dataset.name;
        dropdown.style.display = 'none';
    });
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.cust-search-wrap')) dropdown.style.display = 'none';
    });
    // Allow clearing by emptying the field
    input.addEventListener('blur', function() {
        setTimeout(function() {
            if (!input.value.trim()) hidden.value = '';
        }, 250);
    });
}
initCustomerTypeahead('jobCustomerSearch', 'jobCustomerId', 'jobCustomerResults');
initCustomerTypeahead('editJobCustomerSearch', 'editJobCustomerId', 'editJobCustomerResults');
async function createJob(e) {
    e.preventDefault();
    const name = document.getElementById('jobName').value.trim();
    if (!name) return;
    const custId = document.getElementById('jobCustomerId').value;
    const payload = {
        name,
        address: document.getElementById('jobAddress').value.trim(),
        city: document.getElementById('jobCity').value.trim(),
        state: document.getElementById('jobState').value.trim(),
        zip_code: document.getElementById('jobZip').value.trim(),
        customer_id: custId ? parseInt(custId) : null,
    };
    const taxVal = document.getElementById('jobTaxRate').value;
    if (taxVal !== '') payload.tax_rate = parseFloat(taxVal) || 0;
    const res = await fetch('/api/jobs', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    if (res.ok) {
        const data = await res.json();
        window.location.href = '/projects/' + data.id;
    } else {
        alert('Failed to create project.');
    }
}
</script>
<script src="/static/projects.js?v=20260307a"></script>
{% endblock %}
