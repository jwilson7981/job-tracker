<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    @page { size: landscape; margin: 0.5in; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #1a1a1a; }
    .header { text-align: center; margin-bottom: 18px; }
    .header h1 { font-size: 18px; color: #1e3a5f; margin-bottom: 2px; }
    .header h2 { font-size: 14px; font-weight: normal; color: #333; margin-bottom: 4px; }
    .header .meta { font-size: 10px; color: #777; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1e3a5f; color: #fff; font-weight: bold; font-size: 10px;
         padding: 6px 8px; text-align: left; white-space: nowrap; }
    td { padding: 5px 8px; border-bottom: 1px solid #ddd; font-size: 10px; }
    tr:nth-child(even) td { background: #f5f7fa; }
    .footer { position: fixed; bottom: 0.3in; left: 0; right: 0;
              text-align: center; font-size: 9px; color: #999; }
</style>
</head>
<body>
    <div class="header">
        <h1>LGHVAC LLC</h1>
        <h2>{{ title }}</h2>
        <div class="meta">Generated {{ generated_at }}</div>
    </div>
    <table>
        <thead>
            <tr>
            {% for h in headers %}
                <th>{{ h }}</th>
            {% endfor %}
            </tr>
        </thead>
        <tbody>
        {% for row in rows %}
            <tr>
            {% for cell in row %}
                <td>{{ cell }}</td>
            {% endfor %}
            </tr>
        {% endfor %}
        </tbody>
    </table>
    <div class="footer">LGHVAC LLC &bull; 3616 Utica Square Dr, Edmond, OK 73034</div>
</body>
</html>
