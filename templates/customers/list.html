{% extends "base.html" %}
{% block title %}Customers{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Customers</h1>
    <div style="display:flex;gap:6px;align-items:center;">
        <div class="export-btns" style="display:inline-flex;gap:6px;">
            <button class="btn btn-secondary btn-small" onclick="exportToExcel('Customers','customersBody','Customers')">Excel</button>
            <button class="btn btn-secondary btn-small" onclick="exportToPDF('Customers','customersBody','Customers')">PDF</button>
        </div>
        <button class="btn btn-primary" onclick="showAddCustomer()">+ New Customer</button>
    </div>
</div>
<div class="filter-bar" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
    <input type="text" id="searchInput" class="form-input" placeholder="Search customers..." oninput="filterCustomers()" style="max-width:280px;">
    <select id="typeFilter" class="form-select" onchange="filterCustomers()" style="max-width:200px;">
        <option value="">All Types</option>
        <option value="General Contractor">General Contractor</option>
        <option value="Developer">Developer</option>
        <option value="Owner">Owner</option>
        <option value="Subcontractor">Subcontractor</option>
        <option value="Other">Other</option>
    </select>
    <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
        <input type="checkbox" id="showInactive" onchange="filterCustomers()"> Show Inactive
    </label>
    <span id="custCount" style="font-size:13px;color:var(--gray-500);margin-left:auto;"></span>
</div>
<div class="module-table-wrapper">
    <table class="data-table">
        <thead><tr>
            <th>Company</th><th>Type</th><th>Primary Contact</th><th>Email</th><th>Phone</th><th>Bids</th><th>Win Rate</th>
        </tr></thead>
        <tbody id="customersBody"><tr><td colspan="7" class="loading">Loading...</td></tr></tbody>
    </table>
</div>

<!-- Add/Edit Customer Modal -->
<div id="customerModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" style="max-width:600px;">
        <div class="modal-header">
            <h3 id="modalTitle">New Customer</h3>
            <button onclick="closeModal()" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editCustId">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="bid-field" style="grid-column:1/-1"><label class="form-label">Company Name *</label>
                    <input type="text" id="custName" class="form-input" required></div>
                <div class="bid-field"><label class="form-label">Company Type</label>
                    <select id="custType" class="form-select">
                        <option value="General Contractor">General Contractor</option>
                        <option value="Developer">Developer</option>
                        <option value="Owner">Owner</option>
                        <option value="Subcontractor">Subcontractor</option>
                        <option value="Other">Other</option>
                    </select></div>
                <div class="bid-field"><label class="form-label">Primary Contact</label>
                    <input type="text" id="custContact" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Email</label>
                    <input type="email" id="custEmail" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Phone</label>
                    <input type="text" id="custPhone" class="form-input"></div>
                <div class="bid-field" style="grid-column:1/-1"><label class="form-label">Address</label>
                    <input type="text" id="custAddress" class="form-input"></div>
                <div class="bid-field"><label class="form-label">City</label>
                    <input type="text" id="custCity" class="form-input"></div>
                <div class="bid-field"><label class="form-label">State</label>
                    <input type="text" id="custState" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Zip</label>
                    <input type="text" id="custZip" class="form-input"></div>
                <div class="bid-field"><label class="form-label">Website</label>
                    <input type="text" id="custWebsite" class="form-input"></div>
                <div class="bid-field" style="grid-column:1/-1"><label class="form-label">Notes</label>
                    <textarea id="custNotes" class="form-textarea" rows="3"></textarea></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveCustomer()">Save</button>
        </div>
    </div>
</div>

<script src="/static/customers.js"></script>
{% endblock %}
